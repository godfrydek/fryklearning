<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="robots" content="noindex,nofollow"/><title>Žádost o přístup · Fryk Learning</title><link rel="stylesheet" href="style.css?v=finalsell1781348453"/><script src="secure.js?v=finalsell1781348453"></script></head><body><main class="wrap">
<div class="topbar"><a class="brand-mini" href="index.html">Fryk Learning</a><a class="nav" href="index.html">Home</a><a class="nav auth-link" href="login.html">Login</a></div>
<section class="hero card"><div class="badge">Fryk Learning · žádost o přístup</div><h1>Žádost o přístup</h1><p class="lead">Vyplň formulář. Žádost dorazí na e-mail ownerovi a po schválení dostaneš přístup.</p></section>
<form class="auth-card card wide-auth" id="signupRequestForm" action="https://formsubmit.co/frydekfilip.business@gmail.com" method="POST">
  <h2>Access request</h2>
  <p class="small">Formulář odešle žádost na <strong>frydekfilip.business@gmail.com</strong>.</p>
  <input type="hidden" name="_subject" value="Fryk Learning – nová žádost o přístup">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_next" value="pending.html?sent=1">
  <label>Jméno / přezdívka<input name="name" placeholder="např. Filip / Hudy" required></label>
  <label>E-mail žadatele<input name="email" type="email" placeholder="student@email.cz" required></label>
  <label>Třída / skupina<input name="class_or_group" placeholder="např. 2.A / spolužák / kámoš"></label>
  <label>Důvod žádosti<textarea name="reason" placeholder="Např. chci se podívat, učit se na test, jsem spolužák..." required></textarea></label>
  <label>Na jak dlouho chceš přístup?<select name="requested_access_length"><option value="1 den">1 den</option><option value="3 dny">3 dny</option><option value="1 týden">1 týden</option><option value="delší domluva">delší domluva</option></select></label>
  <button class="primary" type="submit">Odeslat žádost</button>
</form>
</main></body></html>
