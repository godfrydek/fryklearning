<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><meta name="robots" content="noindex,nofollow"/><title>Login · Fryk Learning</title><link rel="stylesheet" href="style.css?v=finalsell1781348453"/><script src="secure.js?v=finalsell1781348453"></script></head><body class="home-public"><main class="wrap">
<div class="topbar"><a class="brand-mini" href="index.html?v=finalsell1781348453">Fryk Learning</a><a class="nav" href="index.html?v=finalsell1781348453">Home</a><a class="nav" href="signup.html?v=finalsell1781348453">Sign up</a></div>
<section class="hero card home-hero"><div class="badge">Fryk Learning · login</div><h1><span class="gradient-title">Login</span></h1><p class="lead">Přihlas se pro přístup k zápisům, testům a dashboardu.</p></section>
<section class="auth-grid">
  <form class="auth-card card" id="loginForm">
    <div id="lockedMsg"></div>
    <h2>Přihlášení</h2>
    <label>Login<input name="login" autocomplete="username" required></label>
    <label>Heslo<input name="password" type="password" autocomplete="current-password" required></label>
    <button class="primary" type="submit">Přihlásit se</button>
    <a class="secondary" href="signup.html?v=finalsell1781348453">Požádat o přístup</a>
    <div id="loginMsg" class="form-msg"></div>
    <p id="loginStatus" class="small login-status">Načítám systém...</p>
  </form>
  <section class="card box app-side-card">
    <h2>Co se odemkne</h2>
    <div class="subject-points">
      <span>Angličtina, matematika a čeština huby</span>
      <span>Rozsáhlé zápisy a navazující témata</span>
      <span>Automatické odhlášení po 30 minutách neaktivity</span>
    </div>
  </section>
</section>
</main></body></html>
